name: main
on:
  push:
    branches:
    - main
  pull_request:
    branches:
    - main

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
          POSTGRES_DB: hackerspub
        ports:
        - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d hackerspub"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
    - uses: actions/checkout@v4
    - uses: jdx/mise-action@v4
    - name: Get pnpm store directory
      id: pnpm-store
      run: echo "STORE_PATH=$(pnpm store path --silent)" >> "$GITHUB_OUTPUT"
    - uses: actions/cache@v4
      with:
        path: ${{ steps.pnpm-store.outputs.STORE_PATH }}
        key: pnpm-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
        restore-keys: pnpm-${{ runner.os }}-
    # Deno re-downloads every npm/jsr/https module on each cold runner;
    # caching DENO_DIR (default ~/.cache/deno on Linux) keyed on the deno
    # manifests cuts the codegen + tests cold-start cost noticeably.
    - uses: actions/cache@v4
      with:
        path: ~/.cache/deno
        key: deno-${{ runner.os }}-${{ hashFiles('deno.lock', '**/deno.json', '**/deno.jsonc') }}
        restore-keys: deno-${{ runner.os }}-
    - name: Install dependencies
      run: pnpm install --frozen-lockfile
    - name: Run codegen
      run: npx @dotenvx/dotenvx run -f .env.ci -- deno task -r codegen
    - name: Run database migrations
      run: npx @dotenvx/dotenvx run -f .env.ci -- mise run migrate
    - name: Run tests
      if: always()
      run: npx @dotenvx/dotenvx run -f .env.ci -- deno task test
    - name: Check for untranslated messages
      if: always()
      run: |
        cd web-next/src/locales
        has_untranslated=false
        for file in */messages.po; do
          echo "Checking $file..."
          while IFS= read -r line; do
            if [ -n "$line" ]; then
              line_num=$(echo "$line" | cut -d: -f1)
              msgid=$(echo "$line" | cut -d: -f2-)
              echo "::error file=web-next/src/locales/$file,line=$line_num::Untranslated message: $msgid"
              has_untranslated=true
            fi
          done < <(awk '/^msgid/ && !/^msgid ""$/ { msgid = $0; getline; while (/^"/) getline; if (/^msgstr ""$/) print NR ": " msgid }' "$file")

          if [ "$has_untranslated" = false ]; then
            echo "✅ All messages translated in $file"
          fi
        done
        if [ "$has_untranslated" = true ]; then
          echo "::error::Found untranslated messages in .po files. Please translate all messages before merging."
          exit 1
        fi
    - name: Extract web-next translations
      if: always()
      run: cd web-next && pnpm extract
    - name: Check for uncommitted changes
      if: always()
      run: |
        has_changes=false

        # Non-.po files: byte-for-byte git diff (covers schema.graphql etc.)
        while IFS= read -r file; do
          echo "::error file=$file::Generated file has uncommitted changes - please run generators locally and commit"
          git diff --unified=0 "$file" | grep '^@@' | while read -r hunk; do
            line_info=$(echo "$hunk" | sed 's/.*+\([0-9]*\).*/\1/')
            [ -n "$line_info" ] && echo "::error file=$file,line=$line_info::Generated content differs from committed version"
          done
          has_changes=true
        done < <(git diff --name-only -- ':!*.po')

        # .po files: semantic comparison via proper parser
        # Ignores volatile-but-non-semantic changes (#: location comments,
        # #. placeholder notes, POT-Creation-Date) caused by line number shifts.
        mapfile -t changed_po < <(git diff --name-only -- '*.po')
        if [ "${#changed_po[@]}" -gt 0 ]; then
          if ! deno run --allow-read --allow-run=git scripts/check-po-changes.ts "${changed_po[@]}"; then
            has_changes=true
          fi
        fi

        if [ "$has_changes" = "true" ]; then
          echo "::error::Generated files have uncommitted changes. Please run the generators locally and commit the changes."
          exit 1
        fi

  # `deno task check` (lint + typecheck) doesn't need Postgres, web-next's
  # production build, or test execution — but it *does* need codegen output
  # (e.g. web/graphql/__generated__/index.ts) for the typecheck pass to
  # resolve module imports. So this job mirrors the test job up through
  # codegen, then runs check in parallel with the rest of test.
  lint:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: jdx/mise-action@v4
    - name: Get pnpm store directory
      id: pnpm-store
      run: echo "STORE_PATH=$(pnpm store path --silent)" >> "$GITHUB_OUTPUT"
    - uses: actions/cache@v4
      with:
        path: ${{ steps.pnpm-store.outputs.STORE_PATH }}
        key: pnpm-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
        restore-keys: pnpm-${{ runner.os }}-
    - uses: actions/cache@v4
      with:
        path: ~/.cache/deno
        key: deno-${{ runner.os }}-${{ hashFiles('deno.lock', '**/deno.json', '**/deno.jsonc') }}
        restore-keys: deno-${{ runner.os }}-
    - name: Install dependencies
      run: pnpm install --frozen-lockfile
    - name: Run codegen
      run: npx @dotenvx/dotenvx run -f .env.ci -- deno task -r codegen
    - name: Run checks
      run: deno task check

  # `pnpm build` for web-next (Vite + SolidStart + Sentry/Lingui/Relay
  # plugins) is the slowest step that doesn't need Postgres. Splitting it
  # into its own job runs it in parallel with `test` and shaves the build
  # off the test critical path.
  #
  # vite-plugin-relay-lite runs relay-compiler during the build for web-next
  # (`deno task -r codegen` covers web/graphql but not web-next, since
  # web-next/deno.jsonc has no `codegen` task — only the root's
  # `next:codegen` shortcut wraps it). We let the vite plugin handle it
  # in this job so we don't have to invoke relay twice.
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: jdx/mise-action@v4
    - name: Get pnpm store directory
      id: pnpm-store
      run: echo "STORE_PATH=$(pnpm store path --silent)" >> "$GITHUB_OUTPUT"
    - uses: actions/cache@v4
      with:
        path: ${{ steps.pnpm-store.outputs.STORE_PATH }}
        key: pnpm-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
        restore-keys: pnpm-${{ runner.os }}-
    - uses: actions/cache@v4
      with:
        path: ~/.cache/deno
        key: deno-${{ runner.os }}-${{ hashFiles('deno.lock', '**/deno.json', '**/deno.jsonc') }}
        restore-keys: deno-${{ runner.os }}-
    - name: Install dependencies
      run: pnpm install --frozen-lockfile
    - name: Run codegen
      run: npx @dotenvx/dotenvx run -f .env.ci -- deno task -r codegen
    - name: Build web-next
      run: mise run build:web-next

  image:
    needs: [test, lint, build]
    permissions:
      contents: read
      packages: write
      attestations: write
    strategy:
      matrix:
        os:
        - ubuntu-latest
        - ubuntu-24.04-arm
    runs-on: ${{ matrix.os }}
    steps:
    - uses: docker/setup-buildx-action@v3
    - uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ github.token }}
    - id: arch
      run: |
        set -ex
        if [[ "$RUNNER_ARCH" = "ARM64" ]]; then
          echo arch=arm64 >> "$GITHUB_OUTPUT"
        else
          echo arch=amd64 >> "$GITHUB_OUTPUT"
        fi
    - if: github.event_name == 'push'
      uses: docker/build-push-action@v6
      with:
        pull: "true"
        push: "true"
        no-cache: "false"
        build-args:
          GIT_COMMIT=${{ github.sha }}
        # Pipe the Sentry auth token in as a BuildKit secret so the
        # `RUN --mount=type=secret,id=sentry_auth_token,...` step in the
        # Dockerfile can read it during the web-next build (for source-map
        # upload via @sentry/vite-plugin) without the token ever being
        # baked into an image layer. Only set on push builds — fork PRs
        # don't get repo secrets, and PR builds don't need to upload
        # ephemeral source maps anyway.
        secrets: |
          sentry_auth_token=${{ secrets.SENTRY_AUTH_TOKEN }}
        tags: ghcr.io/${{ github.repository }}:git-${{ github.sha }}-${{ steps.arch.outputs.arch }}
        labels: |
          org.opencontainers.image.revision=${{ github.sha }}
        annotations: |
          org.opencontainers.image.title=Hackers' Pub
          org.opencontainers.image.description=ActivityPub-enabled social network for hackers
          org.opencontainers.image.url=https://hackers.pub/
          org.opencontainers.image.source=https://github.com/dahlia/hackerspub
          org.opencontainers.image.revision=${{ github.sha }}
          org.opencontainers.image.licenses=AGPL-3.0-only
        cache-from:
          type=gha,scope=${{ steps.arch.outputs.arch }}
        cache-to:
          type=gha,scope=${{ steps.arch.outputs.arch }},mode=max
        provenance: false
    # PR builds intentionally rebuild from scratch (`no-cache: "true"`) so
    # they catch the case where someone bumps a dep but forgets to commit
    # the lockfile, or adds a Dockerfile COPY that misses a needed file.
    # Caching is omitted entirely because no-cache makes any cache-from a
    # no-op anyway — bring it back if/when we decide to trade scratch-build
    # verification for faster PR feedback.
    - if: github.event_name == 'pull_request'
      uses: docker/build-push-action@v6
      with:
        pull: "true"
        push: "false"
        no-cache: "true"
        build-args:
          GIT_COMMIT=${{ github.sha }}
        tags: ghcr.io/${{ github.repository }}:git-${{ github.sha }}-${{ steps.arch.outputs.arch }}
        labels: |
          org.opencontainers.image.revision=${{ github.sha }}
        annotations: |
          org.opencontainers.image.title=Hackers' Pub
          org.opencontainers.image.description=ActivityPub-enabled social network for hackers
          org.opencontainers.image.url=https://hackers.pub/
          org.opencontainers.image.source=https://github.com/dahlia/hackerspub
          org.opencontainers.image.revision=${{ github.sha }}
          org.opencontainers.image.licenses=AGPL-3.0-only
        provenance: false

  manifest:
    if: github.event_name == 'push'
    needs: [image]
    permissions:
      contents: read
      packages: write
      attestations: write
    runs-on: ubuntu-latest
    steps:
    - uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ github.token }}
    - uses: Noelware/docker-manifest-action@0.4.2
      with:
        inputs: ghcr.io/${{ github.repository }}:git-${{ github.sha }},ghcr.io/${{ github.repository }}:latest
        images: ghcr.io/${{ github.repository }}:git-${{ github.sha }}-amd64,ghcr.io/${{ github.repository }}:git-${{ github.sha }}-arm64
        push: true
